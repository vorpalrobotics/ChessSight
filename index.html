<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChessSight</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cm-chessboard@8/assets/chessboard.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>ChessSight</h1>
  </header>

  <main>
    <div id="board-container">
      <div id="eval-bar">
        <div id="eval-fill"></div>
        <span id="eval-label">0.0</span>
      </div>
      <div id="board"></div>
    </div>

    <aside id="panel">
      <section id="engine-section">
        <h2>Engine</h2>
        <div id="engine-status">Loading...</div>
        <div id="best-move-display"></div>
        <div id="debug-log"></div>
      </section>

      <section id="controls-section">
        <h2>Controls</h2>
        <div id="controls">
          <button id="btn-flip">Flip Board</button>
          <button id="btn-reset">Reset</button>
          <button id="btn-hint">Show Hint</button>
          <button id="btn-stop" disabled>Stop Engine</button>
        </div>
      </section>

      <section id="fen-section">
        <h2>Position</h2>
        <input id="fen-input" type="text" placeholder="Paste FEN to load position..." spellcheck="false">
        <div class="fen-buttons">
          <button id="btn-load-fen">Load FEN</button>
          <button id="btn-copy-fen">Copy FEN</button>
        </div>
      </section>

      <section id="moves-section">
        <h2>Moves</h2>
        <div id="move-list"></div>
      </section>
    </aside>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
