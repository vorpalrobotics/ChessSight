<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChessSight</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cm-chessboard@8/assets/chessboard.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cm-chessboard@8/assets/extensions/markers/markers.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>ChessSight</h1>
    <button id="btn-menu" class="hidden">&#8592; Menu</button>
  </header>

  <!-- ── Screen 1: Mode selection ── -->
  <div id="screen-select" class="screen">
    <p class="screen-subtitle">Choose a mode</p>
    <div id="mode-grid">
      <button class="mode-card" id="mode-checks">
        <span class="mode-icon">♟</span>
        <span class="mode-name">Checks</span>
        <span class="mode-desc">Count checking moves for each side</span>
      </button>
    </div>
  </div>

  <!-- ── Screen 2: Checks drill ── -->
  <div id="screen-checks" class="screen hidden">
    <div id="checks-top">
      <h2 id="checks-title">Count Checks</h2>
      <div id="checks-controls">
        <span id="checks-timer">0:00</span>
        <span id="checks-misses">Misses: 0</span>
        <button id="btn-checks-done">DONE</button>
      </div>
    </div>

    <div id="checks-board-wrap">
      <div id="checks-board"></div>
    </div>

    <div id="answer-panel">
      <div class="answer-row">
        <span class="answer-label">WHITE</span>
        <div class="digit-buttons" id="digits-white"></div>
      </div>
      <div class="answer-row">
        <span class="answer-label">BLACK</span>
        <div class="digit-buttons" id="digits-black"></div>
      </div>
    </div>

    <div id="checks-status"></div>
    <div id="checks-result" class="hidden"></div>
  </div>

  <!-- ── Screen 3: Engine analysis (existing) ── -->
  <main id="screen-engine" class="hidden">
    <div id="board-container">
      <div id="eval-bar">
        <div id="eval-fill"></div>
        <span id="eval-label">0.0</span>
      </div>
      <div id="board"></div>
    </div>

    <aside id="panel">
      <section id="engine-section">
        <h2>Engine</h2>
        <div id="engine-status">Loading...</div>
        <div id="best-move-display"></div>
        <div id="debug-log"></div>
        <div id="level-row">
          <label for="level-select">Level:</label>
          <select id="level-select">
            <option value="0">Beginner</option>
            <option value="1">Easy</option>
            <option value="2">Medium</option>
            <option value="3" selected>Hard</option>
            <option value="4">Expert</option>
            <option value="5">Max</option>
          </select>
        </div>
      </section>

      <section id="controls-section">
        <h2>Controls</h2>
        <div id="controls">
          <button id="btn-flip">Flip Board</button>
          <button id="btn-reset">Reset</button>
          <button id="btn-hint">Show Hint</button>
          <button id="btn-stop" disabled>Stop Engine</button>
        </div>
      </section>

      <section id="fen-section">
        <h2>Position</h2>
        <input id="fen-input" type="text" placeholder="Paste FEN to load position..." spellcheck="false">
        <div class="fen-buttons">
          <button id="btn-load-fen">Load FEN</button>
          <button id="btn-copy-fen">Copy FEN</button>
        </div>
      </section>

      <section id="moves-section">
        <h2>Moves</h2>
        <div id="move-list"></div>
      </section>
    </aside>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
